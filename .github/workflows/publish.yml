name: Publish to NPM & GitHub Releases

on:
  push:
    tags:
      - 'v*' # Triggers on v1.0.0, v0.1.2, etc.

permissions:
  contents: write # Needed for GitHub Releases
  id-token: write # CRITICAL: Needed for NPM Trusted Publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Build step if you use TypeScript (e.g., runs tsc or esbuild)
      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build --if-present

      # Publishes using dynamic OIDC token (no secrets needed!)
      - name: Publish to NPM
        run: npm publish --provenance --access public

      # Automatically converts your git tag into a clean GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # Generates beautiful "What's Changed" notes automatically
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
